<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
</head>
<body>
    <content align=" center"> <h2>Registration Form</h2></content>
    <table align="center" , border="1">
        <tr>
            <td>Student No :</td>
            <td><input type="text"  name = "sno"></td>
        </tr>
<tr>
    <td>Name :</td>
    <td><input type="text"  name="name"></td>
</tr>
<tr>
    <td>Gender :</td>
    <td><input type="radio" name="gen">Male
    <input type="radio" name="gen">Female</td>
</tr>

<tr>
    <td>Password</td>
    <td><input type="text" name="pass"></td>
</tr>
<tr>
    <td>Branch :</td>
    <td>
        <select name="Branch" >
        <option value="Branch">Branch</option>
        <option value="MSC">MSC</option>
        <option value="MBA">MBA</option>
        <option value="B.TECH">B.Tech</option>
        </select>
    </td>
</tr>

<tr>
    <td>Hobbies :</td>
    <td><input type="checkbox" name="hobbie">Playing cricket
    <input type="checkbox" name="hobbie">Reading Books</td>
</tr>
<tr>
    <td>Address :</td>
    <td>
        <textarea name="add" row="14" cols="30"></textarea>
    </td>
</tr>
<tr>
    <td>
        <input type="button" value="Submit">
    </td>
    <td>
        <input type="button" value="Reset">
    </td>
</tr>
    </table>
</body>
</html>
